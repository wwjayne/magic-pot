name: Build APK
# Self-contained: this single file regenerates the whole Magic Pot project and
# builds an installable Android APK. Add it to a repo at .github/workflows/build.yml
# and an APK appears under the run's Artifacts (~5-10 min).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Materialize project sources
        run: |
          set -e
          mkdir -p lib assets tool
          echo '' | base64 -d > pubspec.yaml
          echo '' | base64 -d > lib/main.dart
          echo '' | base64 -d > lib/claude_service.dart
          echo '' | base64 -d > assets/recipes.json
          echo '' | base64 -d > tool/AndroidManifest.xml
      - name: Scaffold platform folders and build
        run: |
          set -e
          flutter create --platforms=android --org org.magicpot --project-name magic_pot .
          cp tool/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: magic-pot-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
